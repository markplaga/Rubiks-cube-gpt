name: Apply solver update

on:
  push:
    paths:
      - .github/workflows/apply-solver-update.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply solver and spec changes
        env:
          UPDATE_B64: 
        run: |
          python - <<'PY'
          import os, base64, zlib
          exec(zlib.decompress(base64.b64decode(os.environ['UPDATE_B64'])).decode(), {})
          PY

      - name: Commit source and publish branch
        run: |
          cp index.html /tmp/cubed-index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html SPEC.md
          git commit -m "Add animated solve engine"
          git push origin main
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/cubed-index.html index.html
          git add index.html
          git commit -m "Publish animated solve engine" || true
          git push origin gh-pages
