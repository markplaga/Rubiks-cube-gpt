name: Publish fixed cube build

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Publish fixed cube build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Reassemble and validate application
        shell: bash
        run: |
          set -euo pipefail
          cat .fixed-upload/chunk-* | base64 --decode > /tmp/index.html
          test "$(sha1sum /tmp/index.html | awk '{print $1}')" = "de387345feb39880fa36c080c27a61c82e40fb90"
          grep -q 'id="themeSelect"' /tmp/index.html
          grep -q 'Prism Festival' /tmp/index.html
          grep -q "requestAnimationFrame(render)" /tmp/index.html
          grep -q "Default environment styling could not initialize; cube rendering will continue" /tmp/index.html
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re, subprocess
          text = Path('/tmp/index.html').read_text(encoding='ascii')
          assert text.count("id: '") == 25
          ids = re.findall(r'\bid="([^"]+)"', text)
          assert len(ids) == len(set(ids))
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', text, re.S | re.I)
          assert len(scripts) == 1
          Path('/tmp/app.js').write_text(scripts[0], encoding='ascii')
          subprocess.run(['node', '--check', '/tmp/app.js'], check=True)
          PY
      - name: Publish main and Pages
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/index.html index.html
          rm -rf .fixed-upload .github/workflows/publish-fixed-cube.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish self-contained 25-environment cube"
          git push origin main
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/index.html index.html
          rm -rf .fixed-upload .github/workflows/publish-fixed-cube.yml || true
          git add -A
          git commit -m "Publish visible cube with 25 environments"
          git push origin gh-pages
