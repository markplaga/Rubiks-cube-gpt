name: Apply 25 theme environments

on:
  push:
    paths:
      - .github/workflows/apply-theme-environments.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply application and specification updates
        shell: bash
        run: |
          set -euo pipefail
          cat .theme-update/index-*.part > /tmp/index.patch
          cat .theme-update/spec-*.part > /tmp/spec.patch
          git apply --check /tmp/index.patch
          git apply --check /tmp/spec.patch
          git apply /tmp/index.patch
          git apply /tmp/spec.patch
          cp index.html /tmp/cubed-index.html
          rm -rf .theme-update .github/workflows/apply-theme-environments.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add 25 theme environments"
          git push origin main
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/cubed-index.html index.html
          git add index.html
          git commit -m "Publish 25 theme environments"
          git push origin gh-pages
