name: Update comprehensive help

on:
  push:
    paths:
      - .github/workflows/update-help.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-help:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Prepare help updater
        shell: bash
        run: |
          cat > /tmp/update_help.py <<'PY'
          from pathlib import Path
          import base64

          HELP_B64 = ""

          path = Path("index.html")
          source = path.read_text(encoding="utf-8")
          start = source.index('  <div id="helpOverlay"')
          marker = '\n\n  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>'
          end = source.index(marker, start)
          help_html = base64.b64decode(HELP_B64).decode("utf-8")
          path.write_text(source[:start] + help_html + source[end:], encoding="utf-8")
          PY

      - name: Update main and Pages branches
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python /tmp/update_help.py
          git add index.html
          git commit -m "Document all current CUBED capabilities" || true
          git push origin main

          git fetch origin gh-pages
          git checkout -B gh-pages origin/gh-pages
          python /tmp/update_help.py
          git add index.html
          git commit -m "Document all current CUBED capabilities" || true
          git push origin gh-pages
