name: Apply comprehensive help

on:
  push:
    paths:
      - .github/patches/comprehensive-help.ready

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble patch
        run: cat .github/patches/help.part* > /tmp/comprehensive-help.patch

      - name: Update and validate main
        shell: bash
        run: |
          git apply --check /tmp/comprehensive-help.patch
          git apply /tmp/comprehensive-help.patch
          python - <<'PY'
          from pathlib import Path
          import re
          s = Path('index.html').read_text()
          ids = re.findall(r'\bid="([^"]+)"', s)
          dup = sorted({x for x in ids if ids.count(x) > 1})
          if dup: raise SystemExit(f'duplicate IDs: {dup}')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', s, re.S)
          Path('/tmp/cubed-inline.js').write_text('\n'.join(scripts))
          required = ['Complete CUBED help', 'Solver scope:', 'Show all 25 pattern names', 'Show all alternate palette names', 'Reduced motion, focus, and page reloads']
          missing = [x for x in required if x not in s]
          if missing: raise SystemExit(f'missing help content: {missing}')
          PY
          node --check /tmp/cubed-inline.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html SPEC.md
          git commit -m "Expand comprehensive help"
          git push origin HEAD:main

      - name: Update and validate GitHub Pages
        shell: bash
        run: |
          git checkout gh-pages
          git apply --include=index.html --check /tmp/comprehensive-help.patch
          git apply --include=index.html /tmp/comprehensive-help.patch
          python - <<'PY'
          from pathlib import Path
          import re
          s = Path('index.html').read_text()
          ids = re.findall(r'\bid="([^"]+)"', s)
          dup = sorted({x for x in ids if ids.count(x) > 1})
          if dup: raise SystemExit(f'duplicate IDs: {dup}')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', s, re.S)
          Path('/tmp/cubed-inline-pages.js').write_text('\n'.join(scripts))
          PY
          node --check /tmp/cubed-inline-pages.js
          git add index.html
          git commit -m "Expand comprehensive help"
          git push origin gh-pages
