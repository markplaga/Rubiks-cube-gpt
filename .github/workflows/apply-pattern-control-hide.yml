name: Apply pattern controls visibility update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-pattern-control-hide.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update main branch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          source = path.read_text()
          old = """    patternSelect.addEventListener('change', () => {
                if (patternSelect.value === '') return;
                const item = patterns[Number(patternSelect.value)];
                pendingPatterns.push({name: item[0], sequence: tokenize(item[1])});
                patternSelect.value = '';
                patternSelect.blur();
              });
          """
          new = """    patternSelect.addEventListener('change', () => {
                if (patternSelect.value === '') return;
                const item = patterns[Number(patternSelect.value)];
                pendingPatterns.push({name: item[0], sequence: tokenize(item[1])});
                document.body.classList.add('controls-hidden');
                $('#controlsBtn').classList.remove('active');
                patternSelect.value = '';
                patternSelect.blur();
              });
          """

          if old in source:
              path.write_text(source.replace(old, new, 1))
          elif new not in source:
              raise SystemExit('Expected pattern selection block was not found')
          PY

          cp index.html /tmp/cubed-index.html
          rm .github/workflows/apply-pattern-control-hide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-pattern-control-hide.yml
          git commit -m "Hide controls when a pattern is selected"
          git push origin HEAD:main

      - name: Update GitHub Pages branch
        shell: bash
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/cubed-index.html index.html
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Hide controls when a pattern is selected"
            git push origin HEAD:gh-pages
          fi
