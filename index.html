<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d1f">
  <title>CUBED — Loading environments…</title>
  <style>
    html,body{width:100%;height:100%;margin:0;background:#070918;color:#f5f7ff;font-family:system-ui,sans-serif;overflow:hidden}
    main{height:100%;display:grid;place-items:center;text-align:center;padding:24px}
    .mark{font-size:34px;font-weight:800;letter-spacing:.18em}.mark b{color:#59e3ff}.status{margin-top:14px;color:#a8afc3;font-size:13px}
  </style>
</head>
<body>
<main><div><div class="mark">CU<b>B</b>ED</div><div id="status" class="status">Preparing 25 display environments…</div></div></main>
<script>
(() => {
  'use strict';
  const version = '25-environments-v1';
  const patchFiles = Array.from({length: 7}, (_, i) => `theme-patches/index-0${i + 1}.part?v=${version}`);

  function applyUnifiedPatch(source, patchText) {
    const sourceLines = source.replace(/\r\n/g, '\n').split('\n');
    const patchLines = patchText.replace(/\r\n/g, '\n').split('\n');
    const output = [];
    let sourceIndex = 0;
    let i = 0;

    while (i < patchLines.length && !patchLines[i].startsWith('@@ ')) i++;
    while (i < patchLines.length) {
      const match = /^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/.exec(patchLines[i]);
      if (!match) { i++; continue; }
      const oldStart = Number(match[1]) - 1;
      while (sourceIndex < oldStart) output.push(sourceLines[sourceIndex++]);
      i++;

      while (i < patchLines.length && !patchLines[i].startsWith('@@ ')) {
        const line = patchLines[i];
        if (line.startsWith('--- ') || line.startsWith('+++ ')) { i++; continue; }
        const mark = line[0];
        const text = line.slice(1);
        if (mark === ' ') {
          if (sourceLines[sourceIndex] !== text) throw new Error(`Theme patch context mismatch at line ${sourceIndex + 1}`);
          output.push(sourceLines[sourceIndex++]);
        } else if (mark === '-') {
          if (sourceLines[sourceIndex] !== text) throw new Error(`Theme patch removal mismatch at line ${sourceIndex + 1}`);
          sourceIndex++;
        } else if (mark === '+') {
          output.push(text);
        } else if (mark !== '\\' && line !== '') {
          throw new Error('Unsupported theme patch instruction');
        }
        i++;
      }
    }
    while (sourceIndex < sourceLines.length) output.push(sourceLines[sourceIndex++]);
    return output.join('\n');
  }

  Promise.all([
    fetch(`legacy.html?v=${version}`).then(r => { if (!r.ok) throw new Error('Unable to load CUBED'); return r.text(); }),
    Promise.all(patchFiles.map(url => fetch(url).then(r => { if (!r.ok) throw new Error('Unable to load environment data'); return r.text(); })))
  ]).then(([source, parts]) => {
    const completed = applyUnifiedPatch(source, parts.join(''));
    document.open();
    document.write(completed);
    document.close();
  }).catch(error => {
    console.error(error);
    document.getElementById('status').textContent = 'The environment library could not load. Please refresh the page.';
  });
})();
</script>
</body>
</html>
