<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d1f">
  <title>CUBED — Starting…</title>
  <style>
    html,body{width:100%;height:100%;margin:0;background:#070918;color:#f5f7ff;font-family:system-ui,sans-serif;overflow:hidden}
    main{height:100%;display:grid;place-items:center;text-align:center;padding:24px}
    .mark{font-size:34px;font-weight:800;letter-spacing:.18em}.mark b{color:#59e3ff}.status{margin:14px auto 0;color:#a8afc3;font-size:13px;line-height:1.5;max-width:560px}.retry{display:none;margin:18px auto 0;padding:10px 16px;border:1px solid #59e3ff;border-radius:10px;background:rgba(89,227,255,.14);color:#f5f7ff;font:600 13px system-ui;cursor:pointer}
  </style>
</head>
<body>
<main><div><div class="mark">CU<b>B</b>ED</div><div id="status" class="status">Opening the cube and 25 environments…</div><button id="retry" class="retry" type="button">TRY AGAIN</button></div></main>
<script>
(() => {
  'use strict';
  const version = 'environment-runtime-20260718-7';
  const status = document.getElementById('status');
  const retry = document.getElementById('retry');
  const environmentPatches = Array.from({length: 7}, (_, i) => `theme-patches/index-0${i + 1}.part`);
  const runtimeFix = 'theme-patches/environment-runtime-v7.patch';

  function applyUnifiedPatch(source, patchText) {
    const sourceLines = source.replace(/\r\n/g, '\n').split('\n');
    const patchLines = patchText.replace(/\r\n/g, '\n').split('\n');
    const output = [];
    let sourceIndex = 0;
    let i = 0;
    while (i < patchLines.length && !patchLines[i].startsWith('@@ ')) i++;
    while (i < patchLines.length) {
      const match = /^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/.exec(patchLines[i]);
      if (!match) { i++; continue; }
      const oldStart = Number(match[1]) - 1;
      while (sourceIndex < oldStart) output.push(sourceLines[sourceIndex++]);
      i++;
      while (i < patchLines.length && !patchLines[i].startsWith('@@ ')) {
        const line = patchLines[i];
        const mark = line[0];
        const text = line.slice(1);
        if (mark === ' ') {
          if (sourceLines[sourceIndex] !== text) throw new Error(`Patch context mismatch at ${sourceIndex + 1}`);
          output.push(sourceLines[sourceIndex++]);
        } else if (mark === '-') {
          if (sourceLines[sourceIndex] !== text) throw new Error(`Patch removal mismatch at ${sourceIndex + 1}`);
          sourceIndex++;
        } else if (mark === '+') {
          output.push(text);
        } else if (mark !== '\\' && line !== '' && !line.startsWith('--- ') && !line.startsWith('+++ ')) {
          throw new Error('Unsupported patch instruction');
        }
        i++;
      }
    }
    while (sourceIndex < sourceLines.length) output.push(sourceLines[sourceIndex++]);
    return output.join('\n');
  }

  async function fetchText(path) {
    const response = await fetch(`${path}?v=${version}`, {cache: 'no-store'});
    if (!response.ok) throw new Error(`${path}: HTTP ${response.status}`);
    return response.text();
  }

  function openApplication(html) {
    document.open();
    document.write(html);
    document.close();
  }

  async function boot() {
    retry.style.display = 'none';
    status.textContent = 'Opening the cube and 25 environments…';
    try {
      const [legacy, environmentParts, fixPatch] = await Promise.all([
        fetchText('legacy.html'),
        Promise.all(environmentPatches.map(fetchText)),
        fetchText(runtimeFix)
      ]);
      const environmentBuild = applyUnifiedPatch(legacy, environmentParts.join(''));
      const completed = applyUnifiedPatch(environmentBuild, fixPatch);
      const environmentCount = (completed.match(/id: '[^']+', name:/g) || []).length;
      if (environmentCount !== 25 || !completed.includes('id="themeSelect"') || !completed.includes('id="environmentBackdrop"') || !completed.includes('Prism Festival')) {
        throw new Error(`Build verification failed (${environmentCount}/25 environments)`);
      }
      openApplication(completed);
    } catch (error) {
      console.error('CUBED startup failed', error);
      status.textContent = `CUBED could not start: ${error.message}. Tap TRY AGAIN after a moment.`;
      retry.style.display = 'inline-block';
    }
  }

  retry.addEventListener('click', boot);
  boot();
})();
</script>
</body>
</html>
