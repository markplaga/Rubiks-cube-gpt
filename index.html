<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d1f">
  <title>CUBED — Loading environments…</title>
  <style>
    html,body{width:100%;height:100%;margin:0;background:#070918;color:#f5f7ff;font-family:system-ui,sans-serif;overflow:hidden}
    main{height:100%;display:grid;place-items:center;text-align:center;padding:24px}
    .mark{font-size:34px;font-weight:800;letter-spacing:.18em}.mark b{color:#59e3ff}.status{margin:14px auto 0;color:#a8afc3;font-size:13px;line-height:1.5;max-width:520px}.retry{display:none;margin:18px auto 0;padding:10px 16px;border:1px solid #59e3ff;border-radius:10px;background:rgba(89,227,255,.14);color:#f5f7ff;font:600 13px system-ui;cursor:pointer}
  </style>
</head>
<body>
<main><div><div class="mark">CU<b>B</b>ED</div><div id="status" class="status">Preparing 25 display environments…</div><button id="retry" class="retry" type="button">TRY AGAIN</button></div></main>
<script>
(() => {
  'use strict';
  const version = '25-environments-v2';
  const status = document.getElementById('status');
  const retry = document.getElementById('retry');
  const files = Array.from({length: 7}, (_, i) => `theme-patches/index-0${i + 1}.part`);
  const sources = [
    {name: 'published site', base: ''},
    {name: 'GitHub Pages branch', base: 'https://raw.githubusercontent.com/markplaga/Rubiks-cube-gpt/gh-pages/'},
    {name: 'GitHub source branch', base: 'https://raw.githubusercontent.com/markplaga/Rubiks-cube-gpt/main/'}
  ];

  function applyUnifiedPatch(source, patchText) {
    const sourceLines = source.replace(/\r\n/g, '\n').split('\n');
    const patchLines = patchText.replace(/\r\n/g, '\n').split('\n');
    const output = [];
    let sourceIndex = 0;
    let i = 0;
    while (i < patchLines.length && !patchLines[i].startsWith('@@ ')) i++;
    while (i < patchLines.length) {
      const match = /^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/.exec(patchLines[i]);
      if (!match) { i++; continue; }
      const oldStart = Number(match[1]) - 1;
      while (sourceIndex < oldStart) output.push(sourceLines[sourceIndex++]);
      i++;
      while (i < patchLines.length && !patchLines[i].startsWith('@@ ')) {
        const line = patchLines[i];
        if (line.startsWith('--- ') || line.startsWith('+++ ')) { i++; continue; }
        const mark = line[0];
        const text = line.slice(1);
        if (mark === ' ') {
          if (sourceLines[sourceIndex] !== text) throw new Error(`Patch context mismatch at line ${sourceIndex + 1}`);
          output.push(sourceLines[sourceIndex++]);
        } else if (mark === '-') {
          if (sourceLines[sourceIndex] !== text) throw new Error(`Patch removal mismatch at line ${sourceIndex + 1}`);
          sourceIndex++;
        } else if (mark === '+') {
          output.push(text);
        } else if (mark !== '\\' && line !== '') {
          throw new Error('Unsupported patch instruction');
        }
        i++;
      }
    }
    while (sourceIndex < sourceLines.length) output.push(sourceLines[sourceIndex++]);
    return output.join('\n');
  }

  async function fetchText(base, path) {
    const separator = path.includes('?') ? '&' : '?';
    const response = await fetch(`${base}${path}${separator}v=${version}`, {cache: 'no-store'});
    if (!response.ok) throw new Error(`${path}: HTTP ${response.status}`);
    return response.text();
  }

  async function loadFrom(source) {
    status.textContent = `Loading environments from the ${source.name}…`;
    const [legacy, parts] = await Promise.all([
      fetchText(source.base, 'legacy.html'),
      Promise.all(files.map(path => fetchText(source.base, path)))
    ]);
    const completed = applyUnifiedPatch(legacy, parts.join(''));
    if (!completed.includes('id="themeSelect"') || !completed.includes('Prism Festival')) {
      throw new Error('The reconstructed application did not pass its environment check.');
    }
    return completed;
  }

  async function boot() {
    retry.style.display = 'none';
    const failures = [];
    for (const source of sources) {
      try {
        const completed = await loadFrom(source);
        document.open();
        document.write(completed);
        document.close();
        return;
      } catch (error) {
        console.warn(`CUBED load failed from ${source.name}`, error);
        failures.push(`${source.name}: ${error.message}`);
      }
    }
    console.error('CUBED environment loading failed', failures);
    status.textContent = 'CUBED could not load its environment files. Tap TRY AGAIN. If the problem continues, reopen the page after a minute.';
    retry.style.display = 'inline-block';
  }

  retry.addEventListener('click', boot);
  boot();
})();
</script>
</body>
</html>
